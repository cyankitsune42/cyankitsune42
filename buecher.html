<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deine Bücher</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #2b1b17 0%, #120a07 100%);

            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }
        h1 { font-family: 'Cinzel Decorative', serif; font-size: 2.5rem; color: #ffca28; margin-bottom: 20px; }
        p { max-width: 600px; width: 90%; font-size: 1.3rem; font-style: italic; line-height: 1.6; color: #b0bec5; }
        .back-btn { margin-top: 40px; padding: 12px 24px; color: #ffca28; text-decoration: none; border: 1px solid #ffca28; border-radius: 8px; transition: all 0.3s; }
        .back-btn:hover { background: rgba(255, 202, 40, 0.1); }
    </style>
</head>
<body>
    <h1>Deine Bücher</h1>
    <p>Ein gemütlicher Ort für deine Geschichten, Gedanken und zukünftigen Werke. Lass uns hier bald deine eigenen Kapitel schreiben.</p>

</html>
