<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Cyan Kitsune</title>
    <meta name="description" content="Künstlerisches Portfolio von Cyan Kitsune">
    <meta property="og:title" content="Cyan Kitsune">
    <meta property="og:description" content="Künstlerisches Portfolio und kreative Projekte.">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #060b11 0%, #11161d 100%);
            color: #cfd8dc;
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            width: 85%;
            padding: 20px 20px 40px 20px;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
        }

        /* NEU: Der edle Header im Harry Potter- & Kitsune-Stil */
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            gap: 15px;
        }

        .brand-header h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 2rem;
            color: #ffca28;
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 202, 40, 0.4);
        }

        .mask-icon {
            font-size: 1.8rem;
            color: #ffca28;
            filter: drop-shadow(0 0 8px rgba(255, 202, 40, 0.5));
            animation: pulseMask 3s ease-in-out infinite alternate;
        }

        @keyframes pulseMask {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(255, 202, 40, 0.4)); }
            100% { transform: scale(1.08); filter: drop-shadow(0 0 12px rgba(255, 202, 40, 0.7)); }
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f0f4f8;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .nav-btn:hover {
            background: rgba(255, 202, 40, 0.08);
            border-color: #ffca28;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .nav-btn.highlight {
            background: rgba(255, 202, 40, 0.04);
            border-color: rgba(255, 202, 40, 0.3);
        }
